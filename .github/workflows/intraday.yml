name: Intraday Snapshot

on:
  schedule:
    # 24時間運用: 月9:02〜土8:47 JST 15分ごと（毎時2,17,32,47分 = M15確定2分後・混雑回避）
    - cron: "2,17,32,47 * * * 1-5"
    # 月曜早朝カバー: 日曜UTC夜 = 月曜6:02〜8:47 JST
    - cron: "2,17,32,47 21-23 * * 0"
  workflow_dispatch: {}  # 手動実行も可能

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch intraday quotes
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node intraday.js

      - name: Build daytrade context
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node daytrade.js

      - name: Build GPT feed
        run: node build-feed.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/intraday.json data/economic-calendar.json data/daytrade-context.json data/gpt-feed.html data/gpt-feed.txt data/feed.csv data/history.csv
          git diff --cached --quiet || git commit -m "intraday: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push
